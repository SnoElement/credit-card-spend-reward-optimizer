<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Credit Card Spend Optimizer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    h1 {
      color: white;
      font-size: 2.5rem;
      margin-bottom: 10px;
      text-align: center;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.9);
      text-align: center;
      margin-bottom: 40px;
      font-size: 1.1rem;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 30px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
    }

    h2 {
      color: #333;
      font-size: 1.5rem;
      margin-bottom: 20px;
      border-bottom: 3px solid #667eea;
      padding-bottom: 10px;
    }

    .input-group {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 15px;
    }

    label {
      display: flex;
      flex-direction: column;
      font-weight: 600;
      color: #555;
      font-size: 0.95rem;
    }

    label span {
      margin-bottom: 8px;
    }

    input, select {
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 1rem;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    input:hover, select:hover {
      border-color: #667eea;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 25px;
    }

    button {
      padding: 14px 32px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(102, 126, 234, 0.4);
    }

    details {
      margin-bottom: 20px;
    }

    summary {
      cursor: pointer;
      font-weight: 600;
      color: #667eea;
      user-select: none;
      padding: 12px;
      margin: -12px;
      border-radius: 6px;
      transition: background 0.2s ease;
    }

    summary:hover {
      background: rgba(102, 126, 234, 0.05);
    }

    details[open] summary {
      margin-bottom: 12px;
    }

    details[open] .input-group {
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    button:active {
      transform: translateY(0);
    }

    .results-card {
      margin-top: 30px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
      table-layout: fixed;
    }

    thead {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    th {
      padding: 16px;
      text-align: left;
      font-weight: 600;
      white-space: nowrap;
    }

    th:nth-child(1) { width: 20%; }
    th:nth-child(2) { width: 18%; }
    th:nth-child(3) { width: 12%; }
    th:nth-child(4) { width: 12%; }
    th:nth-child(5) { width: 12%; }
    th:nth-child(6) { width: 12%; }
    th:nth-child(7) { width: 14%; }

    td {
      padding: 14px 12px;
      border-bottom: 1px solid #e0e0e0;
      white-space: normal;
      word-break: break-word;
      overflow-wrap: break-word;
      text-align: center;
    }

    td:nth-child(1) { 
      font-weight: 500;
      padding: 14px 16px;
    }

    td:nth-child(2) { 
      font-size: 0.9rem;
      line-height: 1.4;
      padding: 14px 12px;
    }

    td:nth-child(n+3) { 
      font-family: 'Monaco', 'Courier New', monospace;
      padding: 14px 8px;
    }

    tbody tr {
      transition: background 0.2s ease;
      vertical-align: middle;
    }

    tbody tr:nth-child(odd) {
      background: #f8f9ff;
    }

    tbody tr:hover {
      background: #efeffd;
    }

    tbody tr:first-child {
      font-weight: 600;
      background: linear-gradient(90deg, rgba(102, 126, 234, 0.05) 0%, rgba(118, 75, 162, 0.05) 100%);
      color: #333;
    }

    tbody tr:first-child td:first-child {
      color: #667eea;
      font-weight: 700;
    }

    .empty-state {
      text-align: center;
      color: #999;
      padding: 40px;
      font-size: 1.1rem;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 1.8rem;
      }

      .input-group {
        grid-template-columns: 1fr;
      }

      th, td {
        padding: 10px 8px;
        font-size: 0.85rem;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>💳 Credit Card Spend Optimizer</h1>
    <p class="subtitle">Find the best card for your spending category</p>

    <div class="card">
      <h2>Spending Category</h2>
      <div class="input-group">
        <label>
          <span>Select Category</span>
          <select id="category">
            <option value="groceries">Groceries</option>
            <option value="gas">Gas (non-Costco)</option>
            <option value="gas_costco">Gas at Costco</option>
            <option value="dining">Dining</option>
            <option value="online_retail">Online retail</option>
            <option value="travel_general">Travel (general)</option>
            <option value="alaska_airlines">Alaska Airlines</option>
            <option value="hawaiian_airlines">Hawaiian Airlines</option>
            <option value="foreign">Foreign purchases</option>
            <option value="hilton_stays">Hilton stays</option>
            <option value="disney_streaming">Disney streaming</option>
            <option value="costco_general">Costco general</option>
            <option value="other">Other</option>
          </select>
        </label>
      </div>
    </div>

    <div class="card results-card">
      <h2>Results</h2>
      <table id="results">
        <thead>
          <tr>
            <th>Card</th>
            <th>Earning</th>
            <th>Total Value</th>
            <th>Atmos</th>
            <th>Status</th>
            <th>Hilton</th>
            <th>Cash</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <div class="empty-state" id="empty-state" style="display: none;">
        Select a category to see results
      </div>
    </div>

    <div class="card">
      <details>
        <summary>⚙️ Settings</summary>
        <h2 style="border: none; margin: 0 0 15px 0; font-size: 1.1rem; color: #333;">Point Valuations</h2>
        <div class="input-group">
          <label>
            <span>Atmos Redeemable Point Value</span>
            <input type="number" id="atmos_value" step="0.0001" value="0.012">
          </label>
          <label>
            <span>Status Point Value</span>
            <input type="number" id="status_value" step="0.0001" value="0.022222">
          </label>
          <label>
            <span>Hilton Point Value</span>
            <input type="number" id="hilton_value" step="0.0001" value="0.004">
          </label>
        </div>
      </details>
    </div>
  </div>

  </div>

  <script>
    const cards = [
      {
        name: "Atmos Summit",
        atmos: { alaska_airlines: 3, dining: 3, foreign: 3, other: 1 },
        status: { other: 0.5 },
        hilton: {},
        cashback: {}
      },
      {
        name: "Atmos Ascent",
        atmos: {
          alaska_airlines: 3,
          hawaiian_airlines: 3,
          ev_charging: 2,
          gas: 2,
          transit: 2,
          internet_cable: 2,
          streaming: 2,
          other: 1
        },
        status: { other: 0.3333333333 },
        hilton: {},
        cashback: {}
      },
      {
        name: "Hawaiian MC (Atmos)",
        atmos: {
          hawaiian_airlines: 3,
          gas: 2,
          dining: 2,
          groceries: 2,
          other: 1
        },
        status: { other: 0.3333333333 },
        hilton: {},
        cashback: {}
      },
      {
        name: "Amex Blue Cash Everyday",
        atmos: {},
        status: {},
        hilton: {},
        cashback: {
          groceries: 0.03,
          online_retail: 0.03,
          gas: 0.03,
          other: 0.01
        }
      },
      {
        name: "Amex Hilton Aspire",
        atmos: {},
        status: {},
        hilton: {
          hilton_stays: 14,
          flights: 7,
          car_rentals: 7,
          dining: 7,
          other: 3
        },
        cashback: {}
      },
      {
        name: "Disney Premier Visa",
        atmos: {},
        status: {},
        hilton: {},
        cashback: {
          disney_streaming: 0.05,
          gas: 0.02,
          groceries: 0.02,
          dining: 0.02,
          disney_us: 0.02,
          other: 0.01
        }
      },
      {
        name: "Costco Anywhere Visa",
        atmos: {},
        status: {},
        hilton: {},
        cashback: {
          gas_costco: 0.05,
          gas: 0.04,
          dining: 0.03,
          travel_general: 0.03,
          costco_general: 0.02,
          other: 0.01
        }
      }
    ];

    function getRate(map, category) {
      if (category in map) return map[category];
      if ("other" in map) return map["other"];
      return 0;
    }

    function decimalToFraction(decimal) {
      const fractions = [
        { decimal: 0.3333333333, fraction: "1/3" },
        { decimal: 0.6666666667, fraction: "2/3" },
        { decimal: 0.5, fraction: "1/2" },
        { decimal: 0.25, fraction: "1/4" },
        { decimal: 0.75, fraction: "3/4" }
      ];
      
      for (const { decimal: d, fraction: f } of fractions) {
        if (Math.abs(decimal - d) < 0.0001) return f;
      }
      
      return decimal.toString();
    }

    function formatEarning(atmosPts, statusPts, hiltonPts, cashbackRate) {
      const parts = [];
      if (atmosPts > 0) parts.push(`${atmosPts} Atmos Pts/Dollar`);
      if (statusPts > 0) parts.push(`${decimalToFraction(statusPts)} Status Pts/Dollar`);
      if (hiltonPts > 0) parts.push(`${decimalToFraction(hiltonPts)} Hilton Pts/Dollar`);
      if (cashbackRate > 0) parts.push(`${(cashbackRate * 100).toFixed(1)}% Cash`);
      
      if (parts.length === 0) return "—";
      if (parts.length <= 2) return parts.join("<br>");
      
      return parts.slice(0, 2).join("<br>");
    }

    function runOptimizer() {
      const atmosVal = parseFloat(document.getElementById("atmos_value").value) || 0;
      const statusVal = parseFloat(document.getElementById("status_value").value) || 0;
      const hiltonVal = parseFloat(document.getElementById("hilton_value").value) || 0;
      const category = document.getElementById("category").value;

      const rows = [];

      for (const card of cards) {
        const atmosPts = getRate(card.atmos, category);
        const statusPts = getRate(card.status, category);
        const hiltonPts = getRate(card.hilton, category);
        const cashbackRate = getRate(card.cashback, category);

        const atmosValue = atmosPts * atmosVal;
        const statusValue = statusPts * statusVal;
        const hiltonValue = hiltonPts * hiltonVal;
        const cashValue = cashbackRate;

        const total = atmosValue + statusValue + hiltonValue + cashValue;
        const earning = formatEarning(atmosPts, statusPts, hiltonPts, cashbackRate);

        rows.push({
          name: card.name,
          earning,
          total,
          atmosValue,
          statusValue,
          hiltonValue,
          cashValue
        });
      }

      rows.sort((a, b) => b.total - a.total);

      const tbody = document.querySelector("#results tbody");
      tbody.innerHTML = "";
      for (const r of rows) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${r.name}</td>
          <td>${r.earning}</td>
          <td>${(r.total * 100).toFixed(1)}%</td>
          <td>${(r.atmosValue * 100).toFixed(2)}¢</td>
          <td>${(r.statusValue * 100).toFixed(2)}¢</td>
          <td>${(r.hiltonValue * 100).toFixed(2)}¢</td>
          <td>${(r.cashValue * 100).toFixed(2)}¢</td>
        `;
        tbody.appendChild(tr);
      }
    }

    document.getElementById("category").addEventListener("change", runOptimizer);
    document.getElementById("atmos_value").addEventListener("change", runOptimizer);
    document.getElementById("status_value").addEventListener("change", runOptimizer);
    document.getElementById("hilton_value").addEventListener("change", runOptimizer);

    runOptimizer();
  </script>
</body>
</html>
